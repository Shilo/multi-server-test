name: Manual Release Deploy

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Use release export"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: manual-release-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve build version
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = (git rev-parse --short=12 HEAD).Trim()
          "build_version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "BUILD_VERSION $version"

      - name: Install Godot
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "4.6.3-stable"
          $templateVersion = "4.6.3.stable"
          $installRoot = "C:\godot"
          New-Item -ItemType Directory -Force -Path $installRoot | Out-Null

          $godotZip = Join-Path $installRoot "godot.zip"
          $templatesZip = Join-Path $installRoot "templates.zip"
          Invoke-WebRequest "https://github.com/godotengine/godot-builds/releases/download/$version/Godot_v$($version)_win64.exe.zip" -OutFile $godotZip
          Invoke-WebRequest "https://github.com/godotengine/godot-builds/releases/download/$version/Godot_v$($version)_export_templates.tpz" -OutFile $templatesZip

          Expand-Archive -LiteralPath $godotZip -DestinationPath $installRoot -Force
          Expand-Archive -LiteralPath $templatesZip -DestinationPath (Join-Path $installRoot "templates") -Force

          $templateDir = Join-Path $env:APPDATA "Godot\export_templates\$templateVersion"
          New-Item -ItemType Directory -Force -Path $templateDir | Out-Null
          Get-ChildItem -LiteralPath (Join-Path $installRoot "templates\templates") -Force |
            Copy-Item -Destination $templateDir -Recurse -Force

      - name: Configure Git
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run version gate smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          powershell -ExecutionPolicy Bypass -File tools\run_version_gate_smoke.ps1 `
            -Godot "C:\godot\Godot_v4.6.3-stable_win64.exe"

      - name: Export all release artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $args = @(
            "-ExecutionPolicy", "Bypass",
            "-File", "tools\export_all.ps1",
            "-Godot", "C:\godot\Godot_v4.6.3-stable_win64.exe",
            "-BuildVersion", "${{ steps.version.outputs.build_version }}"
          )
          if ("${{ inputs.release }}" -eq "true") {
            $args += "-Release"
          }
          & powershell @args

      - name: Verify exports
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          powershell -ExecutionPolicy Bypass -File tools\verify_export_artifacts.ps1

      - name: Deploy Web client and world packs to GitHub Pages
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          powershell -ExecutionPolicy Bypass -File tools\deploy_github_pages.ps1 `
            -Godot "C:\godot\Godot_v4.6.3-stable_win64.exe" `
            -BuildVersion "${{ steps.version.outputs.build_version }}" `
            -SkipExport `
            -Remote origin `
            -Branch gh-pages

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ steps.version.outputs.build_version }}
          path: |
            builds/server/**
            builds/world_packs/*.pck
            builds/web/world_packs/*.pck
          if-no-files-found: error

      - name: VPS deploy reminder
        shell: pwsh
        run: |
          Write-Host "VPS_DEPLOY_NOT_CONFIGURED"
          Write-Host "When the VPS is ready, add the stop -> upload staged server -> start step here."
