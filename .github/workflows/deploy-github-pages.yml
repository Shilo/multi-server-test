name: Manual Release Deploy

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Use release export"
        required: true
        default: true
        type: boolean
      version:
        description: "Exact MAJOR.MINOR version to release. Leave empty to bump minor."
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: manual-release-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Godot
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "4.6.3-stable"
          $templateVersion = "4.6.3.stable"
          $installRoot = "C:\godot"
          New-Item -ItemType Directory -Force -Path $installRoot | Out-Null

          $godotZip = Join-Path $installRoot "godot.zip"
          $templatesZip = Join-Path $installRoot "templates.zip"
          Invoke-WebRequest "https://github.com/godotengine/godot-builds/releases/download/$version/Godot_v$($version)_win64.exe.zip" -OutFile $godotZip
          Invoke-WebRequest "https://github.com/godotengine/godot-builds/releases/download/$version/Godot_v$($version)_export_templates.tpz" -OutFile $templatesZip

          Expand-Archive -LiteralPath $godotZip -DestinationPath $installRoot -Force
          Expand-Archive -LiteralPath $templatesZip -DestinationPath (Join-Path $installRoot "templates") -Force

          $templateDir = Join-Path $env:APPDATA "Godot\export_templates\$templateVersion"
          New-Item -ItemType Directory -Force -Path $templateDir | Out-Null
          Get-ChildItem -LiteralPath (Join-Path $installRoot "templates\templates") -Force |
            Copy-Item -Destination $templateDir -Recurse -Force

      - name: Configure Git
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run project version unit test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          powershell -ExecutionPolicy Bypass -File tools\run_project_version_test.ps1 `
            -Godot "C:\godot\Godot_v4.6.3-stable_win64.exe"

      - name: Set release project version
        id: version
        shell: pwsh
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $godot = "C:\godot\Godot_v4.6.3-stable_win64.exe"
          function Invoke-ProjectVersion($versionArgs) {
            $out = Join-Path $env:RUNNER_TEMP "project_version.out.log"
            $err = Join-Path $env:RUNNER_TEMP "project_version.err.log"
            Remove-Item -Force -Path $out, $err -ErrorAction SilentlyContinue
            $args = @("--headless", "--path", ".", "--script", "tools\project_version.gd", "--") + $versionArgs
            $process = Start-Process -FilePath $godot -ArgumentList $args -WorkingDirectory "." -RedirectStandardOutput $out -RedirectStandardError $err -PassThru -WindowStyle Hidden
            $process.WaitForExit(30000) | Out-Null
            $process.Refresh()
            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
              throw "Project version command timed out: $($versionArgs -join ' ')"
            }
            if (Test-Path $out) { Get-Content -LiteralPath $out -Raw | Write-Host }
            if (Test-Path $err) { Get-Content -LiteralPath $err -Raw | Write-Host }
            $exitCode = if ($null -eq $process.ExitCode) { 0 } else { $process.ExitCode }
            if ($exitCode -ne 0) {
              throw "Project version command failed with exit code $exitCode"
            }
          }

          $requestedVersion = "$env:REQUESTED_VERSION".Trim()
          if ([string]::IsNullOrWhiteSpace($requestedVersion)) {
            Invoke-ProjectVersion @("--bump-minor")
          } else {
            Invoke-ProjectVersion @("--set", $requestedVersion)
          }

          $project = Get-Content -LiteralPath project.godot -Raw
          if ($project -notmatch 'config/version="([0-9]+\.[0-9])"') {
            throw "Could not read updated project version from project.godot"
          }
          $version = $Matches[1]
          "project_version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "PROJECT_VERSION version=$version"

      - name: Run version gate smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          powershell -ExecutionPolicy Bypass -File tools\run_version_gate_smoke.ps1 `
            -Godot "C:\godot\Godot_v4.6.3-stable_win64.exe"

      - name: Run PackRat version cache smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          powershell -ExecutionPolicy Bypass -File tools\run_packrat_version_cache_smoke.ps1 `
            -Godot "C:\godot\Godot_v4.6.3-stable_win64.exe"

      - name: Export all release artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $args = @(
            "-ExecutionPolicy", "Bypass",
            "-File", "tools\export_all.ps1",
            "-Godot", "C:\godot\Godot_v4.6.3-stable_win64.exe"
          )
          if ("${{ inputs.release }}" -eq "true") {
            $args += "-Release"
          }
          & powershell @args

      - name: Verify exports
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          powershell -ExecutionPolicy Bypass -File tools\verify_export_artifacts.ps1

      - name: Run Web smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          powershell -ExecutionPolicy Bypass -File tools\run_web_smoke.ps1 `
            -Godot "C:\godot\Godot_v4.6.3-stable_win64.exe" `
            -SkipExport

      - name: Commit release project version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $project = Get-Content -LiteralPath project.godot -Raw
          if ($project -notmatch 'config/version="([0-9]+\.[0-9])"') {
            throw "Could not read project version from project.godot"
          }
          $version = $Matches[1]
          git add project.godot
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: bump project version to v$version"
            git push origin HEAD:${{ github.ref_name }}
          } else {
            Write-Host "PROJECT_VERSION_NO_CHANGE version=$version"
          }

      - name: Tag release commit
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $project = Get-Content -LiteralPath project.godot -Raw
          if ($project -notmatch 'config/version="([0-9]+\.[0-9])"') {
            throw "Could not read project version from project.godot"
          }
          $version = $Matches[1]
          $tag = "v$version"
          git fetch --tags origin
          git rev-parse -q --verify "refs/tags/$tag" *> $null
          if ($LASTEXITCODE -eq 0) {
            $tagCommit = git rev-list -n 1 $tag
            $headCommit = git rev-parse HEAD
            if ($tagCommit -ne $headCommit) {
              throw "Release tag $tag already points at $tagCommit, expected $headCommit"
            }
            Write-Host "RELEASE_TAG_EXISTS tag=$tag commit=$(git rev-parse --short HEAD)"
          } else {
            git tag -a $tag -m "Release $tag"
            git push origin $tag
            Write-Host "RELEASE_TAG_CREATED tag=$tag commit=$(git rev-parse --short HEAD)"
          }

      - name: Deploy Web client and world packs to GitHub Pages
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          powershell -ExecutionPolicy Bypass -File tools\deploy_github_pages.ps1 `
            -Godot "C:\godot\Godot_v4.6.3-stable_win64.exe" `
            -SkipExport `
            -Remote origin `
            -Branch gh-pages

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-v${{ steps.version.outputs.project_version }}
          path: |
            builds/server/**
            builds/world_packs/*.pck
            builds/web/world_packs/*.pck
          if-no-files-found: error

      - name: VPS deploy reminder
        shell: pwsh
        run: |
          Write-Host "VPS_DEPLOY_NOT_CONFIGURED"
          Write-Host "When the VPS is ready, add the stop -> upload staged server -> start step here."
