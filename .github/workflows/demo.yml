name: Demo

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - "v*"
      - "demo-*"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GODOT_VERSION: "4.6.3"
  GODOT_STATUS: "stable"

jobs:
  build:
    name: Build Web Demo
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: barichello/godot-ci:4.6.3
    env:
      EXPORT_ROOT: "/tmp/packrat-demo"

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Prepare export directories
        run: |
          apt-get update
          apt-get install -y libfontconfig1 zip
          mkdir -p "$EXPORT_ROOT/web/packs"

      - name: Package PackRat addon
        run: |
          zip -r "$EXPORT_ROOT/packrat-addon.zip" addons/pack_rat LICENSE README.md

      - name: Prepare export templates
        run: |
          template_version="${GODOT_VERSION}.${GODOT_STATUS}"
          target="$HOME/.local/share/godot/export_templates/$template_version"
          mkdir -p "$target"

          for candidate in \
            "/root/.local/share/godot/export_templates/$template_version" \
            "/usr/local/share/godot/export_templates/$template_version"
          do
            if [ -d "$candidate" ]; then
              cp -a "$candidate/." "$target/"
              break
            fi
          done

          if [ ! -f "$target/web_nothreads_release.zip" ]; then
            found="$(find / -path "*/export_templates/$template_version" -type d -print -quit 2>/dev/null || true)"
            if [ -n "$found" ]; then
              cp -a "$found/." "$target/"
            fi
          fi

          test -f "$target/web_nothreads_release.zip"

      - name: Import project
        run: |
          godot --headless --editor --path . --quit

      - name: Run PackRat smokes
        run: |
          godot --headless --path . --scene res://tests/pack_rat_component_smoke.tscn
          godot --headless --path . --scene res://tests/pack_rat_local_file_smoke.tscn
          godot --headless --path . --scene res://tests/pack_rat_editor_export_preset_smoke.tscn
          godot --headless --path . --scene res://tests/pack_rat_http_zip_smoke.tscn
          godot --headless --path . --scene res://tests/pack_rat_http_pck_smoke.tscn
          godot --headless --path . --scene res://tests/pack_rat_pck_hot_update_probe.tscn

      - name: Export editor-authored demo packs
        run: |
          godot --headless --path . --export-pack "Warehouse DLC" "$EXPORT_ROOT/web/packs/packrat-demo-warehouse.pck"
          godot --headless --path . --export-pack "Gallery DLC" "$EXPORT_ROOT/web/packs/packrat-demo-gallery.zip"
          godot --headless --path . --script tools/demo_pack_catalog.gd -- --output-dir="$EXPORT_ROOT/web/packs"

      - name: Verify demo source resources were not generated
        run: |
          if [ -n "$(git status --porcelain -- demo/packs)" ]; then
            git status --porcelain -- demo/packs
            exit 1
          fi
          test ! -e demo/packs/packrat-demo-warehouse.pck
          test ! -e demo/packs/packrat-demo-gallery.zip

      - name: Run demo smoke
        run: |
          godot --headless --path . --scene res://tests/pack_rat_demo_smoke.tscn -- --pack-dir="$EXPORT_ROOT/web/packs"

      - name: Export Web demo
        run: |
          godot --headless --path . --export-release "Web" "$EXPORT_ROOT/web/index.html"

      - name: Package Web demo
        run: |
          cd "$EXPORT_ROOT/web"
          zip -r "$EXPORT_ROOT/packrat-demo-web.zip" .

      - name: Upload pack artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: packrat-demo-packs
          path: ${{ env.EXPORT_ROOT }}/web/packs

      - name: Upload Web artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: packrat-demo-web
          path: ${{ env.EXPORT_ROOT }}/packrat-demo-web.zip

      - name: Upload addon artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: packrat-addon
          path: ${{ env.EXPORT_ROOT }}/packrat-addon.zip

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: ${{ env.EXPORT_ROOT }}/web

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            ${{ env.EXPORT_ROOT }}/packrat-addon.zip
            ${{ env.EXPORT_ROOT }}/packrat-demo-web.zip
            ${{ env.EXPORT_ROOT }}/web/packs/packrat-demo-warehouse.pck
            ${{ env.EXPORT_ROOT }}/web/packs/packrat-demo-gallery.zip

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
